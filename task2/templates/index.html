<!DOCTYPE html>
<html>
<head>
    <title>Cat Dog Classifier</title>
</head>
<body>

    <h1>Upload Image</h1>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="file">
        <input type="submit" value="Predict">
    </form>

    {% if prediction %}
        <h2>Prediction: {{ prediction }}</h2>
    {% endif %}

</body>
</html>
